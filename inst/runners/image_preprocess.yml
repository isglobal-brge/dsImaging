name: image_preprocess
plane: artifact
resource_class: cpu
framework: radiomics
command: python
args_template: ["-m", "dsimaging_preprocess", "--input", "{input_dir}", "--output", "{output_dir}", "--operations", "{operations}"]
timeout_secs: 3600
allowed_params: [dataset_id, image_asset, image_root, operations, spacing, resampled_spacing, lower, upper]
python_deps: ["SimpleITK>=2.0.0", "numpy>=1.23.0,<2"]
