name: dicom_convert
plane: artifact
resource_class: cpu
framework: radiomics
command: python
args_template: ["-m", "dsimaging_dicom_convert", "--input", "{input_dir}", "--output", "{output_dir}"]
timeout_secs: 3600
allowed_params: [dataset_id, dicom_asset, dicom_root, image_asset, converter]
python_deps: ["SimpleITK>=2.0.0", "pyyaml>=5.0", "boto3>=1.28.0", "botocore>=1.31.0"]
